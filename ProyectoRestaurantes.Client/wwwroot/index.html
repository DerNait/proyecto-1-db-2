<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Sistema moderno de gestión de pedidos y restaurantes" />
    <title>RestaurantOS - Sistema de Pedidos</title>
    <base href="/" />
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ProyectoRestaurantes.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <div class="loading-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="url(#grad)"/>
                    <path d="M12 32C12 32 16 20 24 20C32 20 36 32 36 32" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="24" cy="16" r="4" fill="white"/>
                    <defs><linearGradient id="grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                </svg>
                <span>RestaurantOS</span>
            </div>
            <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">x</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Inicializar Lucide icons después de que Blazor monte el DOM
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
        // Re-run icons after Blazor navigation
        window.initLucide = () => lucide.createIcons();
    </script>
</body>

</html>
